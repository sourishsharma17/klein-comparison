                900911955, 473392625, 964669078, 1265438423, 597409993,
                1738238662, 1866808230, 13955984, 1629526406, 1730483679,
                342865763, 1499242942, 907557513, 730682428, 596724165,
                333889689, 462382782, 2055599410, 1639591160, 722831293,
                219494903, 199170185, 815887679, 207696844, 770902344,
                1819980298, 738639289, 1296491778, 568054228, 1733294784,
                93309106, 1567087081, 986607412, 1151541059, 268062141,
                2089750183, 1980614225, 812896394, 169222133, 1185498233,
                629595553, 1781132954, 1349993688, 1328261054, 1901493144,
                1850501473, 776605305, 1239854304, 412936599, 1513056505,
                149368554, 98407117, 1420052173, 489407816, 1660151622,
                621455911, 2115747111, 171351961, 1836780820, 499914621,
                1860759514, 216898921, 816314860, 596943773, 973691210,
                1365121944, 1791238512, 783471137, 349297013,
            ];

            // ════════════════════════════════════════════════════════════════════
            //  HELPERS
            // ════════════════════════════════════════════════════════════════════

            function escapeHtml(s) {
                const el = document.createElement("span");
                el.textContent = s;
                return el.innerHTML;
            }

            function pad4(n) {
                return String(n).padStart(4, "0");
            }

            function getImagePath(source, idx) {
                return source.pathFn(idx);
            }

            function sourceHasImage(source, idx) {
                if (source.minIndex != null && idx < source.minIndex)
                    return false;
                return true;
            }

            // ════════════════════════════════════════════════════════════════════
            //  LOAD TIMING DATA
            // ════════════════════════════════════════════════════════════════════

            // ════════════════════════════════════════════════════════════════════
            //  BUILD CARDS
            // ════════════════════════════════════════════════════════════════════

            const container = document.getElementById("cards");
            const allCards = [];
            let currentSize = "md";

            PROMPTS.forEach((prompt, idx) => {
                const num = idx + 1;
                const card = document.createElement("div");
                card.className = "card";
                card.dataset.index = idx;

                // Header
                const header = document.createElement("div");
                header.className = "card-header";
                header.innerHTML =
                    `<span class="chevron">▼</span>` +
                    `<span class="num">${num}</span>` +
                    `<span class="prompt-text">${escapeHtml(prompt)}</span>`;
                header.addEventListener("click", () => {
                    card.classList.toggle("collapsed");
                });
                card.appendChild(header);

                // Body
                const body = document.createElement("div");
                body.className = "card-body";

                const imagesDiv = document.createElement("div");
                imagesDiv.className = "images";
                updateGridCols(imagesDiv);

                SOURCES.forEach((src) => {
                    const col = document.createElement("div");
                    col.className = "img-col";
                    col.dataset.source = src.key;

                    const label = document.createElement("div");
                    label.className = "img-label";
                    label.style.color = src.color;

                    label.textContent = src.label;
                    col.appendChild(label);

                    const wrapper = document.createElement("div");
                    wrapper.className = "img-wrapper";

                    const hasImage = sourceHasImage(src, idx);

                    const img = document.createElement("img");
                    img.alt = `${src.label} — Prompt ${num}`;
                    img.loading = "lazy";
                    if (hasImage) {
                        img.dataset.src = getImagePath(src, idx);
                    }
                    img.dataset.source = src.key;
                    img.dataset.index = idx;
                    img.addEventListener("load", () =>
                        img.classList.add("loaded"),
                    );
                    img.addEventListener("error", () => {
                        wrapper.classList.add("has-error");
                    });
                    img.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if (hasImage) openLightbox(src.key, idx);
                    });

                    const placeholder = document.createElement("div");
                    placeholder.className = "placeholder";
                    placeholder.textContent = hasImage
                        ? "Loading…"
                        : "No image";

                    const errorOverlay = document.createElement("div");
                    errorOverlay.className = "error-overlay";
                    errorOverlay.textContent = hasImage
                        ? "Failed to load"
                        : "No image for this prompt";

                    if (!hasImage) {
                        wrapper.classList.add("has-error");
                    }

                    wrapper.appendChild(img);
                    wrapper.appendChild(placeholder);
                    wrapper.appendChild(errorOverlay);
                    col.appendChild(wrapper);
                    imagesDiv.appendChild(col);
                });

                body.appendChild(imagesDiv);
                card.appendChild(body);
                container.appendChild(card);
                allCards.push(card);
            });

            // ════════════════════════════════════════════════════════════════════
            //  LAZY LOADING
            // ════════════════════════════════════════════════════════════════════

            const lazyObserver = new IntersectionObserver(
                (entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            const card = entry.target;
                            card.querySelectorAll("img[data-src]").forEach(
                                (img) => {
                                    if (!img.src && img.dataset.src) {
                                        img.src = img.dataset.src;
                                        img.removeAttribute("data-src");
                                    }
                                },
                            );
                            lazyObserver.unobserve(card);
                        }
                    });
                },
                { rootMargin: "600px 0px" },
            );

            allCards.forEach((card) => lazyObserver.observe(card));

            // ════════════════════════════════════════════════════════════════════
            //  TOGGLE PILLS — VISIBILITY
            // ════════════════════════════════════════════════════════════════════

            // Sync pill visual state on load
            document
                .querySelectorAll(".toggle-pill input[type='checkbox']")
                .forEach((cb) => {
                    function sync() {
                        cb.closest(".toggle-pill").classList.toggle(
                            "off",
                            !cb.checked,
                        );
                    }
                    cb.addEventListener("change", sync);
                    sync();
                });

            function getVisibleSources() {
                const visible = [];
                document
                    .querySelectorAll(".toggle-pill[data-source]")
                    .forEach((pill) => {
                        const cb = pill.querySelector("input[type='checkbox']");
                        if (cb && cb.checked) {
                            visible.push(pill.dataset.source);
                        }
                    });
                return visible;
            }

            function updateVisibility() {
                // Sync pill styles
                document
                    .querySelectorAll(".toggle-pill input[type='checkbox']")
                    .forEach((cb) => {
                        cb.closest(".toggle-pill").classList.toggle(
                            "off",
                            !cb.checked,
                        );
                    });

                const visible = getVisibleSources();
                document
                    .querySelectorAll(".img-col[data-source]")
                    .forEach((col) => {
                        col.style.display = visible.includes(col.dataset.source)
                            ? ""
                            : "none";
                    });
                // Update grid columns
                document
                    .querySelectorAll(".images")
                    .forEach((g) => updateGridCols(g));
            }

            function updateGridCols(grid) {
                const visible = getVisibleSources();
                const count = visible.length || 1;
                if (currentSize === "lg") {
                    grid.style.gridTemplateColumns = "1fr";
                } else {
                    grid.style.gridTemplateColumns = `repeat(${count}, 1fr)`;
                }
            }

            // ════════════════════════════════════════════════════════════════════
            //  SIZE SELECTOR
            // ════════════════════════════════════════════════════════════════════

            function setSize(size) {
                currentSize = size;
                document
                    .querySelectorAll("#sizeSelector button")
                    .forEach((btn) => {
                        btn.classList.toggle(
                            "active",
                            btn.textContent.trim().toLowerCase() === size[0],
                        );
                    });
                // Adjust aspect ratio
                const ratio =
                    size === "sm" ? "1/1" : size === "lg" ? "1/1" : "1/1";
                document.querySelectorAll(".img-wrapper").forEach((w) => {
                    w.style.aspectRatio = ratio;
                });
                // Adjust grid
                document
                    .querySelectorAll(".images")
                    .forEach((g) => updateGridCols(g));
                // In large mode, make images full width (one per row)
                // In small mode, limit max-width
                document.querySelectorAll(".img-col").forEach((col) => {
                    if (size === "sm") {
                        col.style.maxWidth = "400px";
                    } else {
                        col.style.maxWidth = "";
                    }
                });
            }

            // ════════════════════════════════════════════════════════════════════
            //  EXPAND / COLLAPSE
            // ════════════════════════════════════════════════════════════════════

            function expandAll() {
                allCards.forEach((c) => c.classList.remove("collapsed"));
            }

            function collapseAll() {
                allCards.forEach((c) => c.classList.add("collapsed"));
            }

            // ════════════════════════════════════════════════════════════════════
            //  LIGHTBOX
            // ════════════════════════════════════════════════════════════════════

            let lbSource = null;
            let lbIndex = 0;

            function openLightbox(sourceKey, promptIdx) {
                lbSource = sourceKey;
                lbIndex = promptIdx;
                updateLightbox();
                document.getElementById("lightbox").classList.add("active");
                document.body.style.overflow = "hidden";
            }

            function closeLightbox(e) {
                if (
                    e &&
                    (e.target.classList.contains("lb-nav") ||
                        e.target.closest(".lb-nav"))
                )
                    return;
                document.getElementById("lightbox").classList.remove("active");
                document.body.style.overflow = "";
            }

            function updateLightbox() {
                const src = SOURCES.find((s) => s.key === lbSource);
                if (!src) return;
                const img = document.getElementById("lbImg");
                img.src = getImagePath(src, lbIndex);
                const label = document.getElementById("lbLabel");
const lbSeed = src.key.startsWith("fal") ? FAL_SEEDS[lbIndex] : null;
                label.innerHTML =
                    `<strong style="color:${src.color}">${src.label}</strong> &nbsp;&middot;&nbsp; #${lbIndex + 1}` +
                    `<br><span style="font-size:0.78rem;opacity:0.7">${escapeHtml(PROMPTS[lbIndex].substring(0, 120))}${PROMPTS[lbIndex].length > 120 ? "…" : ""}</span>`;
            }

            function lbPrev(e) {
                e.stopPropagation();
                lbIndex = (lbIndex - 1 + PROMPTS.length) % PROMPTS.length;
                updateLightbox();
            }

            function lbNext(e) {
                e.stopPropagation();
                lbIndex = (lbIndex + 1) % PROMPTS.length;
                updateLightbox();
            }

            // Keyboard navigation
            document.addEventListener("keydown", (e) => {
                const lb = document.getElementById("lightbox");
                if (!lb.classList.contains("active")) return;
                if (e.key === "Escape") closeLightbox({});
                if (e.key === "ArrowLeft") {
                    lbIndex = (lbIndex - 1 + PROMPTS.length) % PROMPTS.length;
                    updateLightbox();
                }
                if (e.key === "ArrowRight") {
                    lbIndex = (lbIndex + 1) % PROMPTS.length;
                    updateLightbox();
                }
                // Switch source with up/down
                if (e.key === "ArrowUp" || e.key === "ArrowDown") {
                    e.preventDefault();
                    const visible = getVisibleSources();
                    if (visible.length < 2) return;
                    const curIdx = visible.indexOf(lbSource);
                    if (curIdx === -1) return;
                    const dir = e.key === "ArrowDown" ? 1 : -1;
                    const nextIdx =
                        (curIdx + dir + visible.length) % visible.length;
                    lbSource = visible[nextIdx];
                    updateLightbox();
                }
            });

            // ════════════════════════════════════════════════════════════════════
            //  INIT
            // ════════════════════════════════════════════════════════════════════

            updateVisibility();
            
        </script>
    </body>
